name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run cargo publish --dry-run without publishing"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CRATE_VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"

          if [ -z "$CRATE_VERSION" ]; then
            echo "Could not determine crate version from Cargo.toml"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "Tag version v$TAG_VERSION does not match crate version $CRATE_VERSION"
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked --verbose

      - name: Validate package
        run: cargo publish --locked --dry-run

      - name: Publish to crates.io
        if: github.event_name != 'workflow_dispatch' || !inputs['dry-run']
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
