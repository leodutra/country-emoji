name: "Publish Crate"

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run cargo publish --dry-run without publishing"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Read crate version
        id: crate_version
        run: |
          set -euo pipefail
          CRATE_VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"

          if [ -z "$CRATE_VERSION" ]; then
            echo "Could not determine crate version from Cargo.toml"
            exit 1
          fi

          echo "crate_version=$CRATE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: cargo test --verbose

      - name: Validate package
        run: cargo publish --dry-run

      - name: Workflow summary
        run: |
          echo "## Publish crate" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: ${{ steps.crate_version.outputs.crate_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run: ${{ inputs['dry-run'] }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to crates.io
        if: ${{ !inputs['dry-run'] }}
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

